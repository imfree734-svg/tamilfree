<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Commerce App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: #fff;
  padding: 10px;
  text-align: center;
}

.container {
  padding: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

button {
  padding: 10px;
  border: none;
  background: green;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.cart {
  position: fixed;
  right: 0;
  top: 0;
  background: white;
  width: 300px;
  height: 100%;
  padding: 20px;
  box-shadow: -2px 0 10px #ccc;
  overflow-y: auto;
}

input {
  padding: 10px;
  margin: 5px;
  width: 90%;
}

</style>
</head>

<body>

<header>
  <h1>My E-Commerce Store</h1>
</header>

<div class="container">

  <div id="auth">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <h2>Products</h2>
  <div class="products" id="productList"></div>

</div>

<div class="cart" id="cart">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <h4 id="total">Total: ₹0</h4>
  <button onclick="pay()">Checkout</button>
</div>

<script>

// 🔑 CONFIG
const SUPABASE_URL = "https://opihlskhqvbojkhdmjgz.supabase.co";
const SUPABASE_KEY = "sb_publishable_UwKSMM5fuGrdTwZ9o_zO0g_m2hIuhAc";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🛒 CART
let cart = [];

// AUTH
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signUp({ email, password });
  alert(error ? error.message : "Signup successful!");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  alert(error ? error.message : "Login successful!");
}

// LOAD PRODUCTS
async function loadProducts() {
  const { data, error } = await supabase.from('products').select('*');
  const container = document.getElementById("productList");
  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
      </div>
    `;
  });
}

// ADD TO CART
function addToCart(product) {
  cart.push(product);
  renderCart();
}

// RENDER CART
function renderCart() {
  const list = document.getElementById("cartItems");
  list.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

// 💳 RAZORPAY PAYMENT
function pay() {
  let total = cart.reduce((sum, item) => sum + item.price, 0);

  const options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: total * 100,
    currency: "INR",
    name: "My Store",
    description: "Test Transaction",
    handler: function (response) {
      alert("Payment Successful! ID: " + response.razorpay_payment_id);
      cart = [];
      renderCart();
    },
    theme: {
      color: "#3399cc"
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

// INIT
loadProducts();

</script>

</body>
</html>
